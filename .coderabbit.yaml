# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "ru-RU"
reviews:
  profile: "assertive" # Более строгий тон для критичных проектов
  tools:
    phpstan:
      enabled: true
    phpcs:
      enabled: true
  path_instructions:
    - path: "src/**/*.php"
      instructions: |
        - Проверяй соответствие стандартам PSR-12.
        - Предлагай замену `isset()` на оператор null-coalescing `??` там, где это уместно.
        - Убедись, что все методы имеют объявленные типы аргументов и возвращаемых значений (Type Hinting).
